<!DOCTYPE html>
<html>
<head>
<title>Nova Reclamação</title>
</head>
<body>

<h1>Nova Reclamação Anônima</h1>

<form action="/salvar" method="POST">

<input type="text"
name="titulo"
placeholder="Título"
required>

<br><br>

<textarea
name="descricao"
placeholder="Descreva o problema"
required>
</textarea>

<br><br>

<select name="categoria">

<option>Infraestrutura</option>
<option>Limpeza</option>
<option>Segurança</option>
<option>Wi-Fi</option>
<option>Outros</option>

</select>

<br><br>

<input type="text"
name="local"
placeholder="Local do problema"
required>

<br><br>

<button type="submit">
Enviar Reclamação
</button>

</form>

</body>
</html>
