<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Nova Reclamação</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#edf2f7;
}

header{
    background:#0d47a1;
    color:white;
    text-align:center;
    padding:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
}

.card{
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h2{
    color:#0d47a1;
    margin-bottom:25px;
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

textarea{
    resize:vertical;
    min-height:130px;
}

button{
    margin-top:25px;
    width:100%;
    padding:14px;
    border:none;
    background:#1976d2;
    color:white;
    font-size:17px;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0d47a1;
}

.voltar{
    display:block;
    margin-top:20px;
    text-align:center;
    text-decoration:none;
    color:#1976d2;
    font-weight:bold;
}

.voltar:hover{
    color:#0d47a1;
}

.contador{
    display:block;
    margin-top:5px;
    text-align:right;
    color:#666;
    font-size:13px;
}

.mensagem{
    display:none;
    margin-top:5px;
    color:#d32f2f;
    font-size:13px;
    font-weight:bold;
    background:#ffeaea;
    border:1px solid #ffb5b5;
    padding:8px;
    border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>📢 Canal Anônimo de Reclamações</h1>

</header>

<div class="container">

<div class="card">

<h2>Nova Reclamação</h2>

<form action="/salvar" method="POST">

<label>Título</label>

<input
type="text"
id="titulo"
name="titulo"
maxlength="100"
required>

<span class="contador" id="contadorTitulo">0 / 100</span>

<div class="mensagem" id="msgTitulo">
Limite máximo de caracteres atingido!
</div>

<label>Descrição</label>

<textarea
id="descricao"
name="descricao"
maxlength="500"
required></textarea>

<span class="contador" id="contadorDescricao">0 / 500</span>

<div class="mensagem" id="msgDescricao">
Limite máximo de caracteres atingido!
</div>

<label>Categoria</label>

<select name="categoria">

<option>Infraestrutura</option>
<option>Limpeza</option>
<option>Segurança</option>
<option>Internet</option>
<option>Banheiros</option>
<option>Refeitório</option>
<option>Equipamentos</option>
<option>Outros</option>

</select>

<label>Local</label>

<input
type="text"
id="local"
name="local"
maxlength="100"
required>

<span class="contador" id="contadorLocal">0 / 100</span>

<div class="mensagem" id="msgLocal">
Limite máximo de caracteres atingido!
</div>

<button type="submit">

Enviar Reclamação

</button>

</form>

<a class="voltar" href="/">

← Voltar

</a>

</div>

</div>

<script>

function controlarCampo(idCampo, idContador, idMensagem, limite){

    const campo = document.getElementById(idCampo);
    const contador = document.getElementById(idContador);
    const mensagem = document.getElementById(idMensagem);

    function atualizar(){

        contador.innerHTML = campo.value.length + " / " + limite;

        if(campo.value.length >= limite){

            mensagem.style.display = "block";

        }else{

            mensagem.style.display = "none";

        }

    }

    campo.addEventListener("input", atualizar);

    campo.addEventListener("keydown", function(e){

        const teclasPermitidas = [
            "Backspace",
            "Delete",
            "ArrowLeft",
            "ArrowRight",
            "ArrowUp",
            "ArrowDown",
            "Tab",
            "Home",
            "End"
        ];

        if(
            campo.value.length >= limite &&
            !teclasPermitidas.includes(e.key) &&
            !e.ctrlKey &&
            !e.metaKey
        ){

            e.preventDefault();

            mensagem.style.display = "block";

        }

    });

    atualizar();

}

controlarCampo(
    "titulo",
    "contadorTitulo",
    "msgTitulo",
    100
);

controlarCampo(
    "descricao",
    "contadorDescricao",
    "msgDescricao",
    500
);

controlarCampo(
    "local",
    "contadorLocal",
    "msgLocal",
    100
);

</script>

</body>

</html>
