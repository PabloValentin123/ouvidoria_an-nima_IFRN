<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Reclamação — Ouvidoria IFRN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='nova.css') }}">
</head>
<body>

<header>
    <h1>Nova Reclamação Anônima</h1>
    <p class="brand-sub">Seu relato é sigiloso e ajuda a melhorar o campus</p>
</header>

<div class="container">
    <div class="card">
        <h2>Descreva a ocorrência</h2>

        <form action="/salvar" method="POST">

            <label for="titulo">Título</label>
            <input type="text"
                   id="titulo"
                   name="titulo"
                   placeholder="Resuma o problema em poucas palavras"
                   maxlength="100"
                   required>

            <label for="descricao">Descrição</label>
            <textarea id="descricao"
                      name="descricao"
                      placeholder="Descreva o problema com o máximo de detalhes possível"
                      maxlength="600"
                      oninput="document.getElementById('contador').textContent = this.value.length + '/600'"
                      required></textarea>
            <span class="contador" id="contador">0/600</span>

            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria">
                <option>Infraestrutura</option>
                <option>Limpeza</option>
                <option>Segurança</option>
                <option>Wi-Fi</option>
                <option>Outros</option>
            </select>

            <label for="local">Local do problema</label>
            <input type="text"
                   id="local"
                   name="local"
                   placeholder="Ex: Bloco B, Laboratório 3"
                   required>

            <button type="submit">Enviar Reclamação</button>

        </form>

        <a class="voltar" href="/">← Voltar ao canal</a>
    </div>
</div>

<footer>
    <p>Instituto Federal do Rio Grande do Norte — Canal Anônimo de Reclamações</p>
</footer>

</body>
</html>
