<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #edf2f7;
            color: #333;
        }

        header {
            background: #0d47a1;
            color: white;
            padding: 25px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        .container {
            width: 95%;
            max-width: 1400px;
            margin: 35px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,.08);
        }

        thead {
            background: #1565c0;
            color: white;
        }

        th {
            padding: 18px;
            text-align: left;
            font-size: 15px;
        }

        td {
            padding: 20px 14px;
            vertical-align: top;
            border-bottom: 1px solid #ececec;

            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        tr {
            transition: .2s;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        /* Larguras */

        th:nth-child(1),
        td:nth-child(1) {
            width: 42%;
        }

        th:nth-child(2),
        td:nth-child(2) {
            width: 14%;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 16%;
        }

        th:nth-child(4),
        td:nth-child(4) {
            width: 10%;
            text-align: center;
        }

        th:nth-child(5),
        td:nth-child(5) {
            width: 12%;
        }

        th:nth-child(6),
        td:nth-child(6) {
            width: 6%;
            text-align: center;
        }

        .titulo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
            color: #1a1a1a;
        }

        .descricao {
            color: #555;
            line-height: 1.5;
        }

        .status-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: white;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #1976d2;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: .2s;
        }

        button:hover {
            background: #0d47a1;
        }

        .excluir {
            display: flex;
            justify-content: center;
            align-items: center;

            width: 100%;
            min-width: 90px;
            height: 42px;

            background: #d32f2f;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;

            transition: .2s;
        }

        .excluir:hover {
            background: #b71c1c;
        }

        .voltar {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 22px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: .2s;
        }

        .voltar:hover {
            background: #0d47a1;
        }

        .status {
            font-weight: bold;
        }

    </style>

</head>

<body>

<header>
    <h1>Painel Administrativo</h1>
</header>

<div class="container">

    <table>

        <thead>
            <tr>
                <th>Título</th>
                <th>Categoria</th>
                <th>Local</th>
                <th>Status</th>
                <th>Atualizar</th>
                <th>Excluir</th>
            </tr>
        </thead>

        <tbody>

        {% for r in reclamacoes %}

            <tr>

                <td>

                    <span class="titulo">
                        {{ r.titulo }}
                    </span>

                    <div class="descricao">
                        {{ r.descricao }}
                    </div>

                </td>

                <td>
                    {{ r.categoria }}
                </td>

                <td>
                    {{ r.local }}
                </td>

                <td class="status">
                    {{ r.status }}
                </td>

                <td>

                    <form class="status-form"
                          action="/status/{{ r.id }}"
                          method="POST">

                        <select name="status">

                            <option {% if r.status=="Aberta" %}selected{% endif %}>Aberta</option>

                            <option {% if r.status=="Em análise" %}selected{% endif %}>Em análise</option>

                            <option {% if r.status=="Em andamento" %}selected{% endif %}>Em andamento</option>

                            <option {% if r.status=="Resolvida" %}selected{% endif %}>Resolvida</option>

                        </select>

                        <button type="submit">
                            Salvar
                        </button>

                    </form>

                </td>

                <td>

                    <a class="excluir"
                       href="/excluir/{{ r.id }}">
                        Excluir
                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    <a class="voltar" href="/">
        ← Voltar ao site
    </a>

</div>

</body>

</html>
