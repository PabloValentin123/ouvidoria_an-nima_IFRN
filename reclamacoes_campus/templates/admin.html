<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Painel Administrativo</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;

}

body{

background:#edf2f7;

}

header{

background:#0d47a1;
padding:25px;
text-align:center;
color:white;


}

.container{

    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    margin:40px auto;

}

table{

    width:90%;
    max-width:1200px;
    border-collapse:collapse;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    border-radius:10px;
    overflow:hidden;

}

th{

background:#1565c0;
color:white;
padding:15px;

}

td{

padding:15px;
border-bottom:1px solid #ddd;
vertical-align:top;

}

tr:hover{

background:#f3f7fb;

}

select{

padding:8px;
border-radius:5px;

}

button{

padding:8px 15px;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;

}

button:hover{

background:#0d47a1;

}

.excluir{

background:#d32f2f;
padding:8px 15px;
border-radius:5px;
color:white;
text-decoration:none;

}

.excluir:hover{

background:#b71c1c;

}

.voltar{

display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#1976d2;
color:white;
text-decoration:none;
border-radius:5px;

}

.voltar:hover{

background:#0d47a1;

}

</style>

</head>

<body>

<header>

<h1>Painel Administrativo</h1>

</header>

<div class="container">

<table>

<tr>

<th>Título</th>
<th>Categoria</th>
<th>Local</th>
<th>Status</th>
<th>Atualizar</th>
<th>Excluir</th>

</tr>

{% for r in reclamacoes %}

<tr>

<td>

<strong>{{ r.titulo }}</strong>

<br><br>

{{ r.descricao }}

</td>

<td>

{{ r.categoria }}

</td>

<td>

{{ r.local }}

</td>

<td>

{{ r.status }}

</td>

<td>

<form
action="/status/{{ r.id }}"
method="POST">

<select name="status">

<option>Aberta</option>
<option>Em análise</option>
<option>Em andamento</option>
<option>Resolvida</option>

</select>

<br><br>

<button>

Salvar

</button>

</form>

</td>

<td>

<a
class="excluir"
href="/excluir/{{ r.id }}">

Excluir

</a>

</td>

</tr>

{% endfor %}

</table>

<a
class="voltar"
href="/">

← Voltar ao site

</a>

</div>

</body>

</html>
